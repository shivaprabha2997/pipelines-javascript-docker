<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take It DevOps Chat</title>
<style>
/* --- General Styling --- */
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  overflow: hidden;
}
.container {
  background: rgba(0,0,0,0.85);
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
  box-shadow: 0 0 50px rgba(0,0,0,0.6);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: fadeIn 1.5s ease;
}

/* --- Header --- */
header {
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  padding: 1.2rem;
  text-align: center;
  font-size: 2rem;
  font-weight: bold;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
  cursor: default;
  transition: transform 0.3s ease;
}
header:hover { transform: scale(1.05); }

/* --- Chat Area --- */
.chat {
  flex: 1;
  padding: 1rem;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.message {
  padding: 0.8rem 1rem;
  border-radius: 15px;
  max-width: 70%;
  animation: slideIn 0.5s ease forwards;
  opacity: 0;
}
.user { align-self: flex-end; background: #ff7f50; color: #fff; }
.bot { align-self: flex-start; background: #00ced1; color: #000; }

/* --- Input --- */
.input-container {
  display: flex;
  border-top: 2px solid #444;
  background: #1a1a1a;
}
input[type=text] {
  flex: 1;
  padding: 1rem;
  border: none;
  outline: none;
  font-size: 1rem;
  color: #fff;
  background: #1a1a1a;
}
button {
  padding: 1rem 1.5rem;
  border: none;
  background: linear-gradient(90deg, #ff6ec4, #7873f5);
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,110,196,0.7);
}

/* --- Animations --- */
@keyframes fadeIn { from {opacity:0; transform: scale(0.95);} to {opacity:1; transform:scale(1);} }
@keyframes slideIn { to {opacity:1; transform: translateY(0);} from {opacity:0; transform: translateY(20px);} }

/* --- Scrollbar --- */
.chat::-webkit-scrollbar { width: 6px; }
.chat::-webkit-scrollbar-thumb { background: #ff6ec4; border-radius: 3px; }
.chat::-webkit-scrollbar-track { background: transparent; }

/* --- Glow Effects --- */
.message.bot { box-shadow: 0 0 10px #00ced1; }
.message.user { box-shadow: 0 0 10px #ff7f50; }
</style>
</head>
<body>

<div class="container">
  <header>Take It DevOps Chat 💬</header>
  <div class="chat" id="chat">
    <div class="message bot">Hello! I am Take It 🤖. Ask me anything about DevOps!</div>
  </div>
  <div class="input-container">
    <input type="text" id="userInput" placeholder="Type your DevOps question...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// --- Chat Logic ---
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');

// DevOps Q&A
const responses = {
  "ci/cd": "CI/CD stands for Continuous Integration and Continuous Deployment/Delivery. It automates building, testing, and deploying applications.",
  "jenkins": "Jenkins is an open-source automation server used for CI/CD pipelines.",
  "docker": "Docker is a platform to build, ship, and run containerized applications.",
  "kubernetes": "Kubernetes is a container orchestration platform for automating deployment, scaling, and management of containers.",
  "ansible": "Ansible is an open-source automation tool for configuration management, application deployment, and task automation.",
  "git": "Git is a distributed version control system used to track code changes and collaborate with teams.",
  "terraform": "Terraform is an infrastructure-as-code tool for building, changing, and versioning infrastructure safely.",
  "monitoring": "Monitoring tools like Prometheus and Grafana help track application performance and system metrics.",
  "aws": "AWS (Amazon Web Services) provides cloud computing services including servers, storage, databases, networking, and more.",
  "azure": "Azure is Microsoft's cloud platform offering a wide range of cloud services for computing, networking, and storage.",
  "devops": "DevOps is a set of practices that combines software development and IT operations to shorten the development lifecycle.",
  "default": [
    "Interesting question about DevOps! Can you elaborate?",
    "I can help explain that. Ask me another DevOps topic.",
    "Let's explore that DevOps concept together!",
    "Hmm, that's advanced. Want a simpler explanation?"
  ]
};

function sendMessage() {
  if(!input.value) return;

  // User message
  const userMsg = document.createElement('div');
  userMsg.className = 'message user';
  userMsg.textContent = input.value;
  chat.appendChild(userMsg);
  userMsg.style.animationDelay = '0s';

  // Bot response
  setTimeout(() => {
    const botMsg = document.createElement('div');
    botMsg.className = 'message bot';
    botMsg.textContent = getBotResponse(input.value);
    chat.appendChild(botMsg);
    botMsg.style.animationDelay = '0s';
    chat.scrollTop = chat.scrollHeight;
  }, 500);

  input.value = '';
  chat.scrollTop = chat.scrollHeight;
}

function getBotResponse(msg) {
  msg = msg.toLowerCase();
  for (let key in responses) {
    if (msg.includes(key)) return Array.isArray(responses[key]) ? responses[key][Math.floor(Math.random()*responses[key].length)] : responses[key];
  }
  // Default random DevOps response
  return responses["default"][Math.floor(Math.random()*responses["default"].length)];
}

// Enter key sends message
input.addEventListener("keydown", e => {
  if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
