<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps AI Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        input { width: 100%; padding: 10px; font-size: 16px; }
        #result { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>

<h2>DevOps AI Search</h2>
<input type="text" id="searchInput" placeholder="Type your DevOps question..." />

<div id="result">Answer will appear here...</div>

<script>
    // Small DevOps FAQ database
    const devopsIndex = {
        "what is devops": "DevOps is a set of practices that combines software development (Dev) and IT operations (Ops) to shorten the development lifecycle and deliver high-quality software continuously.",

        "ci/cd": "CI/CD stands for Continuous Integration and Continuous Deployment. It automates building, testing, and deploying applications.",

       "what is git": "Git is a distributed version control system used to track changes in source code during software development.",

       "what is github": "GitHub is a cloud-based platform that hosts Git repositories and helps developers collaborate on projects.",

"what is jenkins": "Jenkins is an open-source automation server used to build, test, and deploy applications automatically.",

"what is docker": "Docker is a containerization platform that allows developers to package applications and their dependencies into containers.",

"what is kubernetes": "Kubernetes is an open-source platform used to automate deployment, scaling, and management of containerized applications.",

"what is container": "A container is a lightweight package that includes an application and its dependencies to run consistently across environments.",

"what is containerization": "Containerization is the process of packaging an application and its dependencies into a container for consistent deployment.",

"what is a docker image": "A Docker image is a read-only template used to create containers. It contains the application code, runtime, libraries, and dependencies.",

"what is a docker container": "A Docker container is a running instance of a Docker image.",

"what is a dockerfile": "A Dockerfile is a script that contains instructions to build a Docker image automatically.",

"what is docker hub": "Docker Hub is a cloud-based registry where Docker images can be stored and shared.",

"what is infrastructure as code": "Infrastructure as Code (IaC) is the practice of managing infrastructure using code instead of manual configuration.",

"what is terraform": "Terraform is an open-source Infrastructure as Code tool used to provision and manage cloud infrastructure.",

"what is ansible": "Ansible is an automation tool used for configuration management, application deployment, and task automation.",

"what is monitoring": "Monitoring is the process of continuously observing system performance and health using tools.",

"what is prometheus": "Prometheus is an open-source monitoring and alerting toolkit used for collecting metrics from applications and infrastructure.",

"what is grafana": "Grafana is an open-source analytics and visualization platform used to monitor system metrics.",

"what is a pipeline": "A pipeline in DevOps is a series of automated steps that build, test, and deploy code.",

"what is continuous integration": "Continuous Integration is a practice where developers frequently merge code changes into a shared repository and run automated tests.",

"what is continuous deployment": "Continuous Deployment automatically releases code changes to production after passing all tests.",

"what is continuous delivery": "Continuous Delivery ensures code changes are automatically prepared for release to production.",

"what is load balancing": "Load balancing distributes network traffic across multiple servers to ensure reliability and performance.",

"what is a microservice": "Microservices architecture divides applications into small, independent services that communicate through APIs.",

"what is cloud computing": "Cloud computing delivers computing services such as servers, storage, and databases over the internet.",

"what is aws": "AWS (Amazon Web Services) is a cloud computing platform that provides infrastructure and services for building applications.",

"what is azure": "Microsoft Azure is a cloud platform offering services for computing, networking, storage, and application development.",

"what is gcp": "Google Cloud Platform is a cloud computing service offered by Google for building and deploying applications.",

"what is version control": "Version control is a system that records changes to files over time so you can track and manage modifications."
        
    };

    const searchInput = document.getElementById('searchInput');
    const resultDiv = document.getElementById('result');

    searchInput.addEventListener('input', function() {
        const query = searchInput.value.toLowerCase().trim();
        if(devopsIndex[query]) {
            resultDiv.textContent = devopsIndex[query];
        } else {
            resultDiv.textContent = "No answer found. Try another DevOps question.";
        }
    });
</script>

</body>
</html>
